name: Print Hello World
on:
  push:
jobs:
  print:
    runs-on: ubuntu-latest
    defaults:
      working-directort:backend
    steps:
      - name: Print Hello
        run: echo "Hello World"
      - name: Repo Clone
        uses: actions/checkout@v4
      - name: Steup Node Version
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name : Install dependencies
        run: npm ci
      - name: run test
        run: npm run test
      - name: Add Numbers
        run: node index.js